<div>
  <h2>Book List</h2>
  <button class="btn btn-primary mb-2" (click)="addBookModal.open()">Add Book</button>
  <app-add-book-modal #addBookModal (bookAdded)="bookAdded($event)"></app-add-book-modal>
  <app-edit-book-modal #editBookModal (bookUpdated)="bookAdded($event)"></app-edit-book-modal>
  <app-add-book (bookAdded)="bookAdded($event)" [currentBookIsbn]="currentBookIsbn"></app-add-book>

  <hr>

  <form class="form-inline" [formGroup]="searchBookForm">
    <label for="searchType">Book Search</label>
    <select id="searchType" class="form-control" formControlName="searchType">
      <option>Title</option>
      <option>Author</option>
      <option>ReadingLevel/Box</option>
      <option>Book BarCode</option>
    </select>
    <input id="searchText" class="form-control" formControlName="searchText" (keyup.enter)="searchBooks()" >
    <button class="btn btn-primary" (click)="searchBooks()">Search</button>
    <button class="btn btn-secondary" (click)="exportToTab()">Export To File</button>
  </form>

  <div>
      <ngx-datatable
        class="bootstrap"
        [rows]="books"
        [columns]="columns"
        [loadingIndicator]="loadingIndicator"
        [footerHeight]="50"
        [rowHeight]="'auto'"
        [externalPaging]="true"
        [count]="bookList.count"
        [offset]="lastSearchParams.offset / lastSearchParams.limit"
        [limit]="lastSearchParams.limit"
        [selected]="selected"
        [selectionType]="'single'"
        (select)="onSelect($event)"
        (page)='setPage($event)'>
        <ngx-datatable-column prop="isbn" name="ISBN" [sortable]="false"></ngx-datatable-column>
        <ngx-datatable-column prop="title" name="Title" [sortable]="false"></ngx-datatable-column>
        <ngx-datatable-column prop="author" name="Author" [sortable]="false"></ngx-datatable-column>
        <ngx-datatable-column prop="guidedReadingLevel" name="Reading Level" [sortable]="false"></ngx-datatable-column>
        <ngx-datatable-column prop="publisherText" name="Publisher" [sortable]="false"></ngx-datatable-column>
        <ngx-datatable-column prop="boxNumber" name="Box" [sortable]="false"></ngx-datatable-column>
        <ngx-datatable-column prop="bookCopyCount" name="Copies" [sortable]="false"></ngx-datatable-column>
        <ngx-datatable-column prop="reservedCopies" name="CheckedOut" [sortable]="false"></ngx-datatable-column>
        <ngx-datatable-column name="Actions" [width]="180" [sortable]="false" [canAutoResize]="false">
          <ng-template let-row="row" ngx-datatable-cell-template>
            <button class="btn btn-sm btn-info me-1" (click)="openEditBookModal(row)">Edit</button>
            <button class="btn btn-sm btn-success" (click)="openAddCopyModal(row)">Add Copy</button>
          </ng-template>
        </ngx-datatable-column>
      </ngx-datatable>

    </div>
</div>
