<ng-template #content>
  <div class="modal-header">
    <h4 class="modal-title">Add Book</h4>
    <button type="button" class="btn-close" aria-label="Close" (click)="close()"></button>
  </div>
  <div class="modal-body">
    <form [formGroup]="addBookForm" (ngSubmit)="save()" novalidate>
      <div class="mb-3">
        <label for="addBookIsbn" class="form-label">ISBN</label>
        <input id="addBookIsbn" class="form-control" formControlName="isbn" aria-label="ISBN" />
      </div>
      <div class="mb-3">
        <label for="addBookTitle" class="form-label">Title</label>
        <input id="addBookTitle" class="form-control" formControlName="title" aria-label="Title" />
        <div *ngIf="addBookForm.get('title').invalid && addBookForm.get('title').touched" class="text-danger">Title is required</div>
      </div>
      <div class="mb-3">
        <label for="addBookAuthor" class="form-label">Author</label>
        <input id="addBookAuthor" class="form-control" formControlName="author" aria-label="Author" />
        <div *ngIf="addBookForm.get('author').invalid && addBookForm.get('author').touched" class="text-danger">Author is required</div>
      </div>
      <div class="mb-3">
        <label for="addBookReadingLevel" class="form-label">Reading Level</label>
        <select id="addBookReadingLevel" class="form-control" formControlName="guidedReadingLevel" aria-label="Reading Level">
          <option value="">Select a level</option>
          <option value="K">K</option>
          <option value="1-3">1-3</option>
          <option value="4-6">4-6</option>
          <option value="7-9">7-9</option>
          <option value="10-12">10-12</option>
          <option value="Adult">Adult</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="addBookBoxNumber" class="form-label">Box Number</label>
        <input id="addBookBoxNumber" class="form-control" formControlName="boxNumber" aria-label="Box Number" />
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-primary" [disabled]="addBookForm.invalid" (click)="save()">Save</button>
    <button type="button" class="btn btn-outline-dark" (click)="close()">Close</button>
  </div>
</ng-template>
