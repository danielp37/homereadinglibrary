<div class="container">
  <h2>Year End Student Progress</h2>
  <div class="mb-3">
    <button class="btn btn-primary me-2" (click)="runReport()" [disabled]="loading || exporting">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
      <span>{{ loading ? 'Loading...' : 'Run Report' }}</span>
    </button>
    <button class="btn btn-secondary" (click)="exportCSV()" [disabled]="loading || exporting">
      <span *ngIf="exporting" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
      <span>{{ exporting ? 'Exporting...' : 'Export CSV' }}</span>
    </button>
  </div>
  <div *ngIf="hasRun && !loading">
    <p *ngIf="rows.length === 0" class="text-muted">No data found.</p>
    <table class="table table-striped table-hover" *ngIf="rows.length > 0">
      <thead>
        <tr>
          <th>Teacher</th>
          <th>Grade</th>
          <th>Last Name</th>
          <th>First Name</th>
          <th>Starting Level</th>
          <th>Ending Level</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of rows">
          <td>{{ row.teacherName }}</td>
          <td>{{ row.grade }}</td>
          <td>{{ row.lastName }}</td>
          <td>{{ row.firstName }}</td>
          <td>{{ row.startingReadingLevel }}</td>
          <td>{{ row.endingReadingLevel }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
