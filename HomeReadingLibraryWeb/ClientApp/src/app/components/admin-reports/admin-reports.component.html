<div class="container">
  <h2>Administrative Reports: End-of-Year Student Reading Levels</h2>
  <button class="btn btn-primary mb-3" (click)="exportCSV()">
    Export CSV
  </button>
  <div *ngIf="loading" class="text-center my-3">Loading...</div>
  <table class="table table-striped table-hover" *ngIf="!loading">
    <thead>
      <tr>
        <th>Teacher</th>
        <th>Grade</th>
        <th>Last Name</th>
        <th>First Name</th>
        <th>Starting Level</th>
        <th>Ending Level</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of rows">
        <td>{{ row.teacherName }}</td>
        <td>{{ row.grade }}</td>
        <td>{{ row.lastName }}</td>
        <td>{{ row.firstName }}</td>
        <td>{{ row.startingReadingLevel }}</td>
        <td>{{ row.endingReadingLevel }}</td>
      </tr>
    </tbody>
  </table>
</div>
